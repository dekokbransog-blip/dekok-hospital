<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DEKOK Hospital - Advanced Widescreen Medicine Portal</title>
    <style>
        :root {
            --primary: #0284c7;
            --primary-hover: #0369a1;
            --secondary: #0f172a;
            --bg-light: #f8fafc;
            --card-bg: #ffffff;
            --text-dark: #1e293b;
            --text-muted: #64748b;
            --success: #16a34a;
            --border: #cbd5e1;
            --danger: #ef4444;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-light);
            color: var(--text-dark);
            margin: 0;
            padding: 0;
            line-height: 1.6;
        }

        .hero {
            background: linear-gradient(135deg, #0f172a 0%, #0369a1 100%);
            color: white;
            padding: 50px 60px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 4px solid var(--primary);
        }

        .hero-left h1 {
            margin: 0 0 8px 0;
            font-size: 48px;
            font-weight: 900;
            letter-spacing: -1.5px;
        }

        .hero-left p {
            margin: 0;
            font-size: 19px;
            opacity: 0.95;
            max-width: 900px;
        }

        .emergency-badge {
            background-color: var(--danger);
            color: white;
            padding: 14px 28px;
            border-radius: 8px;
            font-weight: 800;
            font-size: 15px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            box-shadow: 0 4px 12px rgba(239, 68, 68, 0.3);
            white-space: nowrap;
        }

        .app-workspace {
            display: flex;
            max-width: 100%;
            margin: 0;
            padding: 40px;
            gap: 40px;
            box-sizing: border-box;
        }

        .side-navigation {
            width: 340px;
            min-width: 340px;
            background-color: var(--card-bg);
            border-radius: 20px;
            padding: 30px;
            height: fit-content;
            position: sticky;
            top: 40px;
            border: 1px solid var(--border);
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.03);
            box-sizing: border-box;
        }

        .side-navigation h2 {
            margin: 0 0 20px 0;
            font-size: 16px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-muted);
            border-bottom: 2px solid #f1f5f9;
            padding-bottom: 12px;
        }

        .filter-menu-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .filter-btn {
            background-color: transparent;
            border: none;
            color: var(--text-dark);
            padding: 16px 20px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 12px;
            cursor: pointer;
            text-align: left;
            transition: all 0.2s ease;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .filter-btn:hover {
            background-color: #f1f5f9;
            color: var(--primary);
        }

        .filter-btn.active {
            background-color: var(--primary);
            color: white;
        }

        .filter-btn .counter-badge {
            background-color: rgba(0, 0, 0, 0.08);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
        }

        .filter-btn.active .counter-badge {
            background-color: rgba(255, 255, 255, 0.2);
        }

        .main-showcase {
            flex-grow: 1;
        }

        .services-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(450px, 1fr));
            gap: 35px;
        }

        .service-card {
            background-color: var(--card-bg);
            border-radius: 24px;
            border: 1px solid var(--border);
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.02);
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex;
            flex-direction: column;
        }

        .service-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 24px 36px rgba(15, 23, 42, 0.08);
            border-color: var(--primary);
        }

        .image-placeholder {
            width: 100%;
            height: 180px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            font-weight: bold;
            color: rgba(255, 255, 255, 0.85);
            position: relative;
        }

        .bg-diag { background: linear-gradient(135deg, #0284c7, #0f172a); }
        .bg-cons { background: linear-gradient(135deg, #6366f1, #312e81); }
        .bg-bact { background: linear-gradient(135deg, #10b981, #064e3b); }
        .bg-fung { background: linear-gradient(135deg, #f59e0b, #78350f); }

        .price-tag {
            position: absolute;
            top: 20px;
            right: 20px;
            background-color: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            color: white;
            padding: 8px 18px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 700;
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        .card-content {
            padding: 35px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        .card-content h3 {
            margin: 0 0 14px 0;
            font-size: 24px;
            font-weight: 800;
            color: var(--secondary);
        }

        .card-content p {
            margin: 0 0 24px 0;
            font-size: 15px;
            color: var(--text-muted);
            line-height: 1.7;
        }

        .medicine-info-box {
            background-color: #f8fafc;
            border-left: 4px solid var(--primary);
            padding: 16px 20px;
            border-radius: 0 12px 12px 0;
            margin-bottom: 24px;
            flex-grow: 1;
        }

        .medicine-info-box h4 {
            margin: 0 0 8px 0;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--secondary);
        }

        .pathogen-list {
            margin: 0;
            padding-left: 20px;
            font-size: 14px;
            color: var(--text-dark);
        }

        .pathogen-list li {
            margin-bottom: 8px;
        }

        .card-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid #f1f5f9;
            padding-top: 24px;
            margin-top: auto;
        }

        .availability {
            font-size: 14px;
            color: var(--success);
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .availability::before {
            content: '';
            width: 10px;
            height: 10px;
            background-color: var(--success);
            border-radius: 50%;
        }

        .book-btn {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .book-btn:hover {
            background-color: var(--primary-hover);
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(4px);
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .modal-content {
            background-color: white;
            padding: 40px;
            border-radius: 24px;
            width: 100%;
            max-width: 480px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            position: relative;
        }

        .close-modal {
            position: absolute;
            top: 20px;
            right: 20px;
            background: none;
            border: none;
            font-size: 26px;
            cursor: pointer;
            color: var(--text-muted);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 700;
        }

        .form-group input {
            width: 100%;
            padding: 14px;
            border: 1px solid var(--border);
            border-radius: 10px;
            box-sizing: border-box;
            outline: none;
            font-size: 15px;
        }

        .submit-btn {
            width: 100%;
            background-color: var(--success);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 10px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <header class="hero">
        <div class="hero-left">
            <h1>DEKOK Hospital</h1>
